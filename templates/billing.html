{% extends "base.html" %}

{% block title %}Billing - Smart Grocery POS{% endblock %}

{% block content %}
<div class="row">
    <!-- Search & Cart Section -->
    <div class="col-lg-8">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-cart3 me-2"></i>Current Bill</h5>
            </div>
            <div class="card-body">
                <!-- Add Item Form -->
                <form id="addItemForm" class="mb-4">
                    <div class="row g-2">
                        <div class="col-md-7">
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                                <input type="text" class="form-control form-control-lg" id="searchQuery"
                                    placeholder="Scan Barcode or Enter Product ID" required autofocus
                                    autocomplete="off">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="input-group">
                                <span class="input-group-text">Qty</span>
                                <input type="number" class="form-control form-control-lg" id="itemQty" value="1"
                                    min="0.01" step="0.01" required>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Add</button>
                        </div>
                    </div>
                </form>

                <!-- Cart Table -->
                <div class="table-responsive bill-cart">
                    <table class="table table-hover align-middle">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th>Item</th>
                                <th>Price</th>
                                <th>Qty</th>
                                <th>GST %</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartTableBody">
                            <!-- Items will be injected here via JS -->
                            <tr id="emptyCartRow">
                                <td colspan="6" class="text-center text-muted py-5">
                                    <i class="bi bi-cart-x fs-1 d-block mb-2"></i>
                                    Cart is empty
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Summary Section -->
    <div class="col-lg-4">
        <div class="card shadow border-primary mb-4">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-receipt me-2"></i>Bill Summary</h5>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Subtotal</span>
                    <span class="fw-bold" id="subtotalAmt">₹0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <span class="text-muted">Total GST</span>
                    <span class="fw-bold" id="gstAmt">₹0.00</span>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Discount (₹)</label>
                    <input type="number" class="form-control form-control-sm" id="discountAmt" value="0" min="0"
                        step="1">
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small">Payment Method</label>
                    <select class="form-select form-select-sm" id="paymentMethod">
                        <option value="Cash">Cash</option>
                        <option value="Card">Card</option>
                        <option value="UPI">UPI</option>
                    </select>
                </div>

                <hr>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="fs-5 fw-bold">Grand Total</span>
                    <span class="grand-total fw-bold" id="grandTotalAmt">₹0.00</span>
                </div>

                <button class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm" id="generateBillBtn"
                    disabled>
                    <i class="bi bi-printer-fill me-2"></i> Generate Bill & Print
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/billing.js') }}"></script>
{% endblock %}
