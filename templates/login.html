{% extends "base.html" %}

{% block title %}Login - Smart Grocery POS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex justify-content-center align-items-center p-3 mb-3 shadow-sm"
                        style="width: 70px; height: 70px;">
                        <i class="bi bi-person-circle fs-1"></i>
                    </div>
                    <h3 class="fw-bold">Manager Login</h3>
                    <p class="text-muted small">Please enter your credentials to access the system.</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username"
                            required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                            required>
                        <label for="password">Password</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Login
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-white text-center border-0 py-3">
                <small class="text-muted">&copy; 2026 Smart Grocery Billing</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
